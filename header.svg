      fill: white;      mask: url(#royalShineMask);      opacity: 0.7;    }        @keyframes royalPulse {      0%, 100% {         filter: url(#royalGlow) drop-shadow(0 0 25px rgba(255, 215, 0, 0.6));        transform: scale(1);      }      50% {         filter: url(#royalGlow) drop-shadow(0 0 35px rgba(255, 215, 0, 0.9));        transform: scale(1.02);      }    }  </style>    <!-- Royal dark background -->  <rect width="100%" height="100%" fill="#0F0F23"/>    <!-- Royal decorative crown elements -->  <polygon points="150,40 160,20 170,40 180,25 190,40 200,20 210,40"            fill="url(#royalGradient)" opacity="0.8">    <animateTransform attributeName="transform" type="rotate"                       values="0 180 30; 5 180 30; 0 180 30" dur="6s" repeatCount="indefinite"/>  </polygon>    <polygon points="590,40 600,20 610,40 620,25 630,40 640,20 650,40"            fill="url(#royalGradient)" opacity="0.8">    <animateTransform attributeName="transform" type="rotate"                       values="0 620 30; -5 620 30; 0 620 30" dur="6s" repeatCount="indefinite"/>  </polygon>    <!-- Main royal text -->  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="royal-text">    B.Gurukiran  </text>    <!-- Royal shine overlay -->  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="royal-shine">    B.Gurukiran  </text>    <!-- Royal decorative lines with gems -->  <line x1="80" y1="130" x2="220" y2="130" stroke="url(#purpleAccent)" stroke-width="3" opacity="0.8">    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>  </line>  <circle cx="150" cy="130" r="4" fill="url(#royalGradient)">    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>  </circle>    <line x1="580" y1="130" x2="720" y2="130" stroke="url(#purpleAccent)" stroke-width="3" opacity="0.8">    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>  </line>  <circle cx="650" cy="130" r="4" fill="url(#royalGradient)">    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>  </circle></svg> 
